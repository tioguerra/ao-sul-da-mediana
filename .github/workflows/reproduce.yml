name: Reprodução

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reproduce-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-reproduction:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obter o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: python -m pip install -r requirements.txt

      - name: Compilar, reproduzir e validar
        run: make check

      - name: Publicar figuras reproduzidas em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: figuras-reproduzidas
          path: |
            artigo/figuras/
            artigo/mapa-cultural/*.png
          retention-days: 7

